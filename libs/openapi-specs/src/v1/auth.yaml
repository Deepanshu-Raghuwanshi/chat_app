openapi: 3.0.0
info:
  title: Auth Service API
  version: 1.0.0
paths:
  /api/v1/auth/login:
    post:
      summary: Login user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful login
  /api/v1/auth/register:
    post:
      summary: Register user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: User registered
  /api/v1/auth/verify-email:
    get:
      summary: Verify email via token
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email verified
  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      responses:
        '200':
          description: Token refreshed
  /api/v1/auth/logout:
    post:
      summary: Logout user
      responses:
        '200':
          description: Logged out
  /api/v1/auth/google:
    get:
      summary: Google OAuth login
      responses:
        '302':
          description: Redirect to Google
  /api/v1/auth/google/callback:
    get:
      summary: Google OAuth callback
      responses:
        '302':
          description: Redirect to frontend
