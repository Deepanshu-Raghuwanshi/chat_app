openapi: 3.0.0
info:
  title: Auth Service API
  version: 1.0.0
paths:
  /api/v1/auth/login:
    post:
      summary: Login user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /api/v1/auth/register:
    post:
      summary: Register user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDto'
      responses:
        '201':
          description: User registered
  /api/v1/auth/verify-email:
    get:
      summary: Verify email via token
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email verified
  /api/v1/auth/change-email:
    post:
      summary: Request email change
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newEmail:
                  type: string
                  format: email
      responses:
        '200':
          description: Verification code sent to new email
  /api/v1/auth/verify-email-change:
    post:
      summary: Verify and complete email change
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                newEmail:
                  type: string
                  format: email
      responses:
        '200':
          description: Email updated successfully
  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      responses:
        '200':
          description: Token refreshed
  /api/v1/auth/logout:
    post:
      summary: Logout user
      responses:
        '200':
          description: Logged out
  /api/v1/auth/google:
    get:
      summary: Google OAuth login
      responses:
        '302':
          description: Redirect to Google
  /api/v1/auth/google/callback:
    get:
      summary: Google OAuth callback
      responses:
        '302':
          description: Redirect to frontend

components:
  schemas:
    LoginDto:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string
    RegisterDto:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string
    AuthResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - user
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          type: object
          required:
            - id
            - email
          properties:
            id:
              type: string
            email:
              type: string
            username:
              type: string
            fullName:
              type: string
            avatarUrl:
              type: string
