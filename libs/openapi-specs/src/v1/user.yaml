openapi: 3.0.0
info:
  title: User Service API
  version: 1.0.0
paths:
  /api/v1/profile:
    get:
      summary: Get current user profile
      responses:
        '200':
          description: User profile
    patch:
      summary: Update user profile
      responses:
        '200':
          description: Profile updated
  /api/v1/users/{userId}:
    get:
      summary: Get user profile by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User profile
