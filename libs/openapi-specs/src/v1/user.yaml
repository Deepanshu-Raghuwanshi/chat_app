openapi: 3.0.0
info:
  title: User Service API
  version: 1.0.0
paths:
  /api/v1/profile:
    get:
      summary: Get current user profile
      responses:
        '200':
          description: User profile
    patch:
      summary: Update user profile
      responses:
        '200':
          description: Profile updated
  /api/v1/users/{userId}:
    get:
      summary: Get user profile by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User profile
  /api/v1/friends:
    get:
      summary: List all friends
      responses:
        '200':
          description: List of friend IDs
  /api/v1/friends/requests:
    post:
      summary: Send friend request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                receiverId:
                  type: string
      responses:
        '201':
          description: Request sent
  /api/v1/friends/requests/incoming:
    get:
      summary: Get incoming friend requests
      responses:
        '200':
          description: List of incoming requests
  /api/v1/friends/requests/{requestId}/respond:
    post:
      summary: Respond to friend request
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [ACCEPT, REJECT]
      responses:
        '200':
          description: Response recorded

components:
  schemas:
    UserProfile:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        fullName:
          type: string
        avatarUrl:
          type: string
        bio:
          type: string
        isOnline:
          type: boolean
    FriendRequest:
      type: object
      properties:
        id:
          type: string
        senderId:
          type: string
        receiverId:
          type: string
        status:
          type: string
          enum: [PENDING, ACCEPTED, REJECTED]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        sender:
          $ref: '#/components/schemas/UserProfile'
        receiver:
          $ref: '#/components/schemas/UserProfile'
