openapi: 3.0.0
info:
  title: User Service API
  version: 1.0.0
paths:
  /api/v1/profile:
    get:
      summary: Get current user profile
      responses:
        '200':
          description: User profile
    patch:
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                bio:
                  type: string
                phoneNumber:
                  type: string
                countryCode:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: Profile updated
  /api/v1/profile/avatar:
    post:
      summary: Upload profile picture
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  avatarUrl:
                    type: string
  /api/v1/users/{userId}:
    get:
      summary: Get user profile by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User profile
  /api/v1/friends:
    get:
      summary: List all friends
      responses:
        '200':
          description: List of friend IDs
  /api/v1/friends/requests:
    post:
      summary: Send friend request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                receiverId:
                  type: string
      responses:
        '201':
          description: Request sent
  /api/v1/friends/search:
    get:
      summary: Search users by username or full name
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (minimum 2 characters). Matches partial username or full name, case-insensitive.
          schema:
            type: string
            minLength: 2
            maxLength: 100
      responses:
        '200':
          description: List of matching user profiles (excludes current user, existing friends, and users with pending requests)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserProfile'
        '400':
          description: Query too short or missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/friends/requests/incoming:
    get:
      summary: Get incoming friend requests
      responses:
        '200':
          description: List of incoming requests
  /api/v1/friends/requests/{requestId}/respond:
    post:
      summary: Respond to friend request
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [ACCEPT, REJECT]
      responses:
        '200':
          description: Response recorded

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        timestamp:
          type: string
          format: date-time
        path:
          type: string
        method:
          type: string
        error:
          type: string
        message:
          type: string

    UserProfile:
      type: object
      required:
        - id
        - username
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        fullName:
          type: string
        avatarUrl:
          type: string
        bio:
          type: string
        phoneNumber:
          type: string
        countryCode:
          type: string
        status:
          type: string
        isOnline:
          type: boolean
    FriendRequest:
      type: object
      properties:
        id:
          type: string
        senderId:
          type: string
        receiverId:
          type: string
        status:
          type: string
          enum: [PENDING, ACCEPTED, REJECTED]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        sender:
          $ref: '#/components/schemas/UserProfile'
        receiver:
          $ref: '#/components/schemas/UserProfile'
