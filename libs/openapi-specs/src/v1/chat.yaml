openapi: 3.0.0
info:
  title: Chat Service API
  version: 1.0.0
  description: Direct messaging between users who are friends

paths:
  /api/v1/chat/conversations:
    get:
      summary: List or search conversations
      description: >
        Without `q`: returns cursor-paginated conversations ordered by most recent activity.
        With `q`: searches ALL conversations across history by the other participant's username or full name.
        Returns up to 50 matches ordered by most recent activity. `limit` and `before` are ignored in search mode.
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          description: Search term — filters by the other participant's username or full name (case-insensitive, minimum 1 character). When present activates search mode; pagination params are ignored.
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: before
          in: query
          description: Return conversations whose last message was older than this conversation ID (cursor)
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Paginated list of conversations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      summary: Create or retrieve a conversation
      description: Creates a new direct-message conversation with a friend, or returns the existing one. Both users must be friends.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationDto"
      responses:
        "200":
          description: Existing conversation returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "201":
          description: New conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "400":
          description: Invalid request (e.g. targetUserId is the requester's own ID)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Users are not friends
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Target user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/chat/conversations/{conversationId}:
    get:
      summary: Get a conversation by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/conversationId"
      responses:
        "200":
          description: Conversation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated user is not a participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/chat/conversations/{conversationId}/messages:
    get:
      summary: Get messages in a conversation
      description: Returns messages in reverse-chronological order (newest first). Pass `before` cursor for pagination.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/conversationId"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: before
          in: query
          description: Return messages sent before this message ID (cursor-based pagination)
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Paginated list of messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated user is not a participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      summary: Send a message
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/conversationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageDto"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Invalid request (e.g. empty content)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated user is not a participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/chat/conversations/{conversationId}/messages/{messageId}:
    patch:
      summary: Edit a message
      description: Only the original sender may edit their message.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/conversationId"
        - $ref: "#/components/parameters/messageId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditMessageDto"
      responses:
        "200":
          description: Updated message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Invalid request (e.g. empty content)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated user did not send this message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conversation or message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      summary: Delete a message
      description: Only the original sender may delete their message. Soft-deletes — content is replaced with a tombstone marker.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/conversationId"
        - $ref: "#/components/parameters/messageId"
      responses:
        "200":
          description: Message deleted (tombstoned)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated user did not send this message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conversation or message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/chat/conversations/{conversationId}/read:
    post:
      summary: Mark conversation as read
      description: Advances the read cursor for the authenticated user to the latest message.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/conversationId"
      responses:
        "200":
          description: Read cursor updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - lastReadAt
                properties:
                  lastReadAt:
                    type: string
                    format: date-time
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated user is not a participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    conversationId:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    messageId:
      name: messageId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    ErrorResponse:
      type: object
      required:
        - statusCode
        - timestamp
        - path
        - method
        - error
        - message
      properties:
        statusCode:
          type: integer
        timestamp:
          type: string
          format: date-time
        path:
          type: string
        method:
          type: string
        error:
          type: string
        message:
          type: string

    ConversationParticipant:
      type: object
      required:
        - userId
        - username
      properties:
        userId:
          type: string
          format: uuid
        username:
          type: string
        fullName:
          type: string
        avatarUrl:
          type: string
        isOnline:
          type: boolean
        lastReadAt:
          type: string
          format: date-time

    Conversation:
      type: object
      required:
        - id
        - participants
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        participants:
          type: array
          items:
            $ref: "#/components/schemas/ConversationParticipant"
          minItems: 2
          maxItems: 2
        lastMessage:
          $ref: "#/components/schemas/Message"
        unreadCount:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ConversationListResponse:
      type: object
      required:
        - data
        - hasMore
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Conversation"
        hasMore:
          type: boolean
        nextCursor:
          type: string
          format: uuid
          description: ID of the oldest conversation in this page; pass as `before` to fetch older conversations

    Message:
      type: object
      required:
        - id
        - conversationId
        - senderId
        - content
        - type
        - status
        - isDeleted
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        conversationId:
          type: string
          format: uuid
        senderId:
          type: string
          format: uuid
        content:
          type: string
        type:
          type: string
          enum: [TEXT]
        status:
          type: string
          enum: [SENT, DELIVERED, READ]
        isDeleted:
          type: boolean
        isEdited:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MessageListResponse:
      type: object
      required:
        - data
        - hasMore
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        hasMore:
          type: boolean
        nextCursor:
          type: string
          format: uuid
          description: ID of the oldest message in this page; pass as `before` to fetch older messages

    CreateConversationDto:
      type: object
      required:
        - targetUserId
      properties:
        targetUserId:
          type: string
          format: uuid
          description: UUID of the friend to start a conversation with
        targetUsername:
          type: string
          description: Display username of the target user (profile hint, avoids a round-trip to user-service)
        targetFullName:
          type: string
          description: Full name of the target user (profile hint)
        targetAvatarUrl:
          type: string
          description: Avatar URL of the target user (profile hint)
        callerUsername:
          type: string
          description: Display username of the requesting user (profile hint)
        callerFullName:
          type: string
          description: Full name of the requesting user (profile hint)
        callerAvatarUrl:
          type: string
          description: Avatar URL of the requesting user (profile hint)

    SendMessageDto:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000
        type:
          type: string
          enum: [TEXT]
          default: TEXT

    EditMessageDto:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000

# Kafka Events
# Produces: message.sent.v1
# Produces: message.edited.v1
# Produces: message.deleted.v1
# Produces: message.read.v1
# Consumes: friend.request.accepted.v1

# Search Mode Behaviour (q param)
# When q is present: ConversationListResponse is returned with hasMore always false.
# When q is absent:  Normal cursor pagination applies (hasMore / nextCursor populated).
