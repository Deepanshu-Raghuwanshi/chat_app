openapi: 3.0.0
info:
  title: Chat Service API
  version: 1.0.0
paths:
  /api/v1/rooms:
    get:
      summary: List rooms
      responses:
        '200':
          description: List of rooms
    post:
      summary: Create room
      responses:
        '201':
          description: Room created
  /api/v1/rooms/{roomId}/participants:
    get:
      summary: List participants
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of participants
