openapi: 3.0.0
info:
  title: Chat Service API
  version: 1.0.0
  description: Direct messaging between users who are friends

paths:
  /api/v1/chat/conversations:
    get:
      summary: List or search conversations
      description: >
        Without `q`: returns cursor-paginated conversations ordered by most recent activity.
        With `q`: searches ALL conversations across history by the other participant's username or full name.
        Returns up to 50 matches ordered by most recent activity. `limit` and `before` are ignored in search mode.
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          description: Search term — filters by the other participant's username or full name (case-insensitive, minimum 1 character). When present activates search mode; pagination params are ignored.
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: before
          in: query
          description: Return conversations whose last message was older than this conversation ID (cursor)
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Paginated list of conversations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      summary: Create or retrieve a conversation
      description: Creates a new direct-message conversation with a friend, or returns the existing one. Both users must be friends.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationDto"
      responses:
        "200":
          description: Existing conversation returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "201":
          description: New conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "400":
          description: Invalid request (e.g. targetUserId is the requester's own ID)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Users are not friends
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Target user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/chat/conversations/{conversationId}:
    get:
      summary: Get a conversation by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/conversationId"
      responses:
        "200":
          description: Conversation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated user is not a participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/chat/conversations/{conversationId}/messages:
    get:
      summary: Get messages in a conversation
      description: Returns messages in reverse-chronological order (newest first). Pass `before` cursor for pagination.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/conversationId"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: before
          in: query
          description: Return messages sent before this message ID (cursor-based pagination)
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Paginated list of messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated user is not a participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      summary: Send a message
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/conversationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageDto"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Invalid request (e.g. empty content)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated user is not a participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/chat/conversations/{conversationId}/messages/{messageId}:
    patch:
      summary: Edit a message
      description: Only the original sender may edit their message.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/conversationId"
        - $ref: "#/components/parameters/messageId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditMessageDto"
      responses:
        "200":
          description: Updated message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Invalid request (e.g. empty content)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated user did not send this message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conversation or message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      summary: Delete a message
      description: Only the original sender may delete their message. Soft-deletes — content is replaced with a tombstone marker.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/conversationId"
        - $ref: "#/components/parameters/messageId"
      responses:
        "200":
          description: Message deleted (tombstoned)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated user did not send this message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conversation or message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/chat/conversations/{conversationId}/messages/{messageId}/reactions:
    post:
      summary: Toggle a reaction on a message
      description: >
        Adds the given emoji reaction for the authenticated user if it does not
        already exist; removes it if it does. Idempotent toggle — calling twice
        returns to the original state. Both participants of the conversation may
        react. Deleted messages cannot be reacted to.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/conversationId"
        - $ref: "#/components/parameters/messageId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleReactionDto"
      responses:
        "200":
          description: Updated message with current reactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Invalid emoji or message is deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated user is not a participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conversation or message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/chat/conversations/{conversationId}/read:
    post:
      summary: Mark conversation as read
      description: Advances the read cursor for the authenticated user to the latest message.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/conversationId"
      responses:
        "200":
          description: Read cursor updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - lastReadAt
                properties:
                  lastReadAt:
                    type: string
                    format: date-time
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated user is not a participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/chat/ai/smart-replies:
    post:
      summary: Generate 3 smart reply suggestions for the last received message
      description: >
        Accepts the last 1–10 messages of a conversation (oldest first) with
        role labels ("me" / "them") and returns exactly 3 short, natural reply
        suggestions from "me"'s perspective. Nothing is persisted. Rate-limited
        to 15 requests per minute per user. The frontend is responsible for
        passing context; the backend never reads the database for this endpoint.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSmartReplyDto"
      responses:
        "200":
          description: Three suggested reply strings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSmartReplyResponse"
        "400":
          description: Invalid request (empty messages array, invalid role, content too long)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded (15 RPM per user)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: AI provider unavailable or timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/chat/ai/rewrite:
    post:
      summary: Rewrite a draft message using AI
      description: >
        Accepts a draft message and a rewrite tone, calls the Gemini AI API on the
        backend, and returns the rewritten text. The API key is stored server-side;
        nothing is persisted. Rate-limited to 15 requests per minute per user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiRewriteDto"
      responses:
        "200":
          description: Rewritten text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRewriteResponse"
        "400":
          description: Invalid request (e.g. empty text, unknown tone)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded (15 RPM per user)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: AI provider unavailable or API key not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    conversationId:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    messageId:
      name: messageId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    ErrorResponse:
      type: object
      required:
        - statusCode
        - timestamp
        - path
        - method
        - error
        - message
      properties:
        statusCode:
          type: integer
        timestamp:
          type: string
          format: date-time
        path:
          type: string
        method:
          type: string
        error:
          type: string
        message:
          type: string

    ConversationParticipant:
      type: object
      required:
        - userId
        - username
      properties:
        userId:
          type: string
          format: uuid
        username:
          type: string
        fullName:
          type: string
        avatarUrl:
          type: string
        isOnline:
          type: boolean
        lastReadAt:
          type: string
          format: date-time

    Conversation:
      type: object
      required:
        - id
        - participants
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        participants:
          type: array
          items:
            $ref: "#/components/schemas/ConversationParticipant"
          minItems: 2
          maxItems: 2
        lastMessage:
          $ref: "#/components/schemas/Message"
        unreadCount:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ConversationListResponse:
      type: object
      required:
        - data
        - hasMore
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Conversation"
        hasMore:
          type: boolean
        nextCursor:
          type: string
          format: uuid
          description: ID of the oldest conversation in this page; pass as `before` to fetch older conversations

    Message:
      type: object
      required:
        - id
        - conversationId
        - senderId
        - content
        - type
        - status
        - isDeleted
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        conversationId:
          type: string
          format: uuid
        senderId:
          type: string
          format: uuid
        content:
          type: string
        type:
          type: string
          enum: [TEXT]
        status:
          type: string
          enum: [SENT, DELIVERED, READ]
        isDeleted:
          type: boolean
        isEdited:
          type: boolean
        replyTo:
          $ref: "#/components/schemas/QuotedMessage"
          description: Present when this message is a quoted reply. Contains a snapshot of the original message.
        reactions:
          type: array
          items:
            $ref: "#/components/schemas/Reaction"
          default: []
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Reaction:
      type: object
      required:
        - emoji
        - userId
        - createdAt
      properties:
        emoji:
          type: string
          minLength: 1
          maxLength: 10
          description: A single emoji character or ZWJ sequence (e.g. "👍", "❤️", "👨‍👩‍👧")
        userId:
          type: string
          format: uuid
          description: The user who added this reaction
        createdAt:
          type: string
          format: date-time

    ToggleReactionDto:
      type: object
      required:
        - emoji
      properties:
        emoji:
          type: string
          minLength: 1
          maxLength: 10
          description: Emoji to toggle. Adding the same emoji again removes it.

    MessageListResponse:
      type: object
      required:
        - data
        - hasMore
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        hasMore:
          type: boolean
        nextCursor:
          type: string
          format: uuid
          description: ID of the oldest message in this page; pass as `before` to fetch older messages

    CreateConversationDto:
      type: object
      required:
        - targetUserId
      properties:
        targetUserId:
          type: string
          format: uuid
          description: UUID of the friend to start a conversation with
        targetUsername:
          type: string
          description: Display username of the target user (profile hint, avoids a round-trip to user-service)
        targetFullName:
          type: string
          description: Full name of the target user (profile hint)
        targetAvatarUrl:
          type: string
          description: Avatar URL of the target user (profile hint)
        callerUsername:
          type: string
          description: Display username of the requesting user (profile hint)
        callerFullName:
          type: string
          description: Full name of the requesting user (profile hint)
        callerAvatarUrl:
          type: string
          description: Avatar URL of the requesting user (profile hint)

    QuotedMessage:
      type: object
      required:
        - messageId
        - senderId
        - content
      properties:
        messageId:
          type: string
          format: uuid
          description: ID of the original message being quoted
        senderId:
          type: string
          format: uuid
          description: User ID of the original message's author
        content:
          type: string
          maxLength: 200
          description: Snapshot of the original message content at reply time (truncated to 200 chars)

    SendMessageDto:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000
        type:
          type: string
          enum: [TEXT]
          default: TEXT
        quotedMessageId:
          type: string
          format: uuid
          description: ID of the message being replied to. When provided, the backend fetches the original message and embeds a snapshot in the new message's replyTo field.

    MessageContextItem:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum: [me, them]
          description: >
            "me" = the current user (the one who will send the smart reply).
            "them" = the other participant (the one whose last message is being replied to).
        content:
          type: string
          minLength: 1
          maxLength: 500
          description: Message text. Truncated to 500 chars by the client before sending.

    AiSmartReplyDto:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          description: >
            Conversation context — last 1 to 10 messages, oldest first.
            Deleted messages must be excluded by the client before sending.
            The last item must always have role "them" (the message being replied to).
          minItems: 1
          maxItems: 10
          items:
            $ref: "#/components/schemas/MessageContextItem"

    AiSmartReplyResponse:
      type: object
      required:
        - suggestions
      properties:
        suggestions:
          type: array
          description: Exactly 3 short reply suggestions, each 3–10 words.
          minItems: 3
          maxItems: 3
          items:
            type: string
            minLength: 1

    AiRewriteDto:
      type: object
      required:
        - text
        - tone
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 4000
          description: The draft message text to rewrite. Stripped of leading/trailing whitespace before being sent to the AI provider.
        tone:
          type: string
          enum: [fix-grammar, professional, casual, shorter, longer]
          description: >
            fix-grammar — correct typos, grammar, and punctuation only.
            professional — rewrite as formal business language.
            casual — rewrite as relaxed, conversational language.
            shorter — condense to essential meaning.
            longer — expand with additional context and detail.

    AiRewriteResponse:
      type: object
      required:
        - rewrittenText
      properties:
        rewrittenText:
          type: string
          minLength: 1
          description: The AI-rewritten version of the input text.

    EditMessageDto:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000

# Kafka Events
# Produces: message.sent.v1        — payload includes optional replyTo: { messageId, senderId, content } when message is a quoted reply
# Produces: message.delivered.v1   — emitted by GetMessagesUseCase when recipient fetches messages that are still SENT
# Produces: message.edited.v1
# Produces: message.deleted.v1
# Produces: message.read.v1        — payload now includes senderId (other participant) for gateway routing
# Produces: message.reaction.toggled.v1
# Consumes: friend.request.accepted.v1

# WebSocket Events (Socket.IO namespace: /presence)
# All typing events flow directly through PresenceGateway — no Kafka, no persistence.
#
# Client → Server (emit from frontend):
#   typing.start  { conversationId: string }
#     — emitted when the user starts typing in a conversation.
#       The sender must already be in the conversation room (join.conversation first).
#   typing.stop   { conversationId: string }
#     — emitted when the user stops typing (debounced ~3 s after last keystroke,
#       or immediately on message send / composer blur).
#
# Server → Client (broadcast to conversation room, sender excluded):
#   typing.started  { conversationId: string, userId: string }
#     — forwarded to all other sockets in conversation:{conversationId}.
#   typing.stopped  { conversationId: string, userId: string }
#     — forwarded to all other sockets in conversation:{conversationId}.

# Search Mode Behaviour (q param)
# When q is present: ConversationListResponse is returned with hasMore always false.
# When q is absent:  Normal cursor pagination applies (hasMore / nextCursor populated).
