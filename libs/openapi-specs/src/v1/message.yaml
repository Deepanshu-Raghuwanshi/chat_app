openapi: 3.0.0
info:
  title: Message Service API
  version: 1.0.0
paths:
  /api/v1/rooms/{roomId}/messages:
    get:
      summary: Get room messages
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of messages
    post:
      summary: Send message
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Message sent
