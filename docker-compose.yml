services:
  # Infrastructure
  postgres:
    image: postgres:15-alpine
    container_name: chat-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chat_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d chat_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chat-network

  mongodb:
    image: mongo:6
    container_name: chat-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chat-network

  redis:
    image: redis:7-alpine
    container_name: chat-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chat-network

  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: chat-zookeeper
    ports:
      - '2181:2181'
    healthcheck:
      test: ["CMD-SHELL", "echo stat | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chat-network

  kafka:
    image: wurstmeister/kafka:latest
    container_name: chat-kafka
    ports:
      - '9092:9092'
    environment:
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server kafka:9092 --list"]
      interval: 20s
      timeout: 10s
      retries: 5
    networks:
      - chat-network

  # Backend Services
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: api-gateway
    container_name: api-gateway
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - NODE_ENV=production
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3002
      - CHAT_SERVICE_URL=http://chat-service:3003
      - MESSAGE_SERVICE_URL=http://message-service:3004
      - NOTIFICATION_SERVICE_URL=http://notification-service:3005
    depends_on:
      - auth-service
    networks:
      - chat-network

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: auth-service
        DATABASE_URL: postgresql://user:password@postgres:5432/chat_db
    container_name: auth-service
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user:password@postgres:5432/chat_db
      - JWT_SECRET=your_very_long_secret_key_here_at_least_32_chars
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - chat-network

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: user-service
        DATABASE_URL: postgresql://user:password@postgres:5432/chat_db
    container_name: user-service
    ports:
      - '3002:3002'
    environment:
      - PORT=3002
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user:password@postgres:5432/chat_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - chat-network

  chat-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: chat-service
        DATABASE_URL: postgresql://user:password@postgres:5432/chat_db
    container_name: chat-service
    ports:
      - '3003:3003'
    environment:
      - PORT=3003
      - NODE_ENV=production
      - MONGODB_URL=mongodb://mongodb:27017/chat_messages
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - chat-network

  message-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: message-service
        DATABASE_URL: postgresql://user:password@postgres:5432/chat_db
    container_name: message-service
    ports:
      - '3004:3004'
    environment:
      - PORT=3004
      - NODE_ENV=production
      - MONGODB_URL=mongodb://mongodb:27017/chat_messages
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - chat-network

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: notification-service
        DATABASE_URL: postgresql://user:password@postgres:5432/chat_db
    container_name: notification-service
    ports:
      - '3005:3005'
    environment:
      - NODE_ENV=production
      - PORT=3005
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - chat-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: frontend
    ports:
      - '4200:3000'
    environment:
      - NODE_ENV=production
      - API_URL=http://api-gateway:3000/api/v1
    depends_on:
      - api-gateway
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
